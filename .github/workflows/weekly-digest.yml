name: Weekly Digest

on:
  schedule:
    # Every Monday at 6:00 AM UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --production

      - name: Send weekly digest
        run: bun run src/index.ts
        env:
          # Required
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ vars.DIGEST_FROM_EMAIL }}
          # Optional
          TIMEZONE: ${{ vars.TIMEZONE }}
          DIGEST_EMAIL_BLACKLIST: ${{ vars.DIGEST_EMAIL_BLACKLIST }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          # LLM (optional — skipped if LLM_BASE_URL is not set)
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_TIMEOUT: ${{ vars.LLM_TIMEOUT }}
          # Weather (optional)
          WEATHER_LOCATION: ${{ vars.WEATHER_LOCATION }}
          WEATHER_LATITUDE: ${{ vars.WEATHER_LATITUDE }}
          WEATHER_LONGITUDE: ${{ vars.WEATHER_LONGITUDE }}
          # F1 (optional)
          F1_SCHEDULE: ${{ vars.F1_SCHEDULE }}
          # Local events (optional)
          EVENTS_ENABLED: ${{ vars.EVENTS_ENABLED }}
          EVENTS_DISTRICT: ${{ vars.EVENTS_DISTRICT }}
